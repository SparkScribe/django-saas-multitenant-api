<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-label="Tenant context resolution flow">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
    <linearGradient id="box" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
  </defs>
  <rect width="960" height="420" fill="#f1f5f9"/>
  <text x="480" y="34" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a">Tenant Context Resolution</text>
  <text x="480" y="56" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#475569">Fail closed  missing or invalid org context returns 403</text>

  <rect x="40" y="90" width="150" height="70" rx="10" fill="url(#box)" stroke="#64748b"/>
  <text x="115" y="120" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">Client</text>
  <text x="115" y="142" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#475569">Bearer JWT</text>

  <rect x="230" y="90" width="170" height="70" rx="10" fill="url(#box)" stroke="#64748b"/>
  <text x="315" y="120" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">JWT Auth</text>
  <text x="315" y="142" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#475569">Identify user</text>

  <rect x="440" y="90" width="220" height="70" rx="10" fill="url(#box)" stroke="#64748b"/>
  <text x="550" y="118" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">Resolve Organization</text>
  <text x="550" y="138" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#475569">1. JWT organization_id claim</text>
  <text x="550" y="154" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#475569">2. X-Organization-Id header</text>

  <rect x="700" y="90" width="220" height="70" rx="10" fill="url(#box)" stroke="#64748b"/>
  <text x="810" y="118" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">Membership Check</text>
  <text x="810" y="142" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#475569">User belongs to org?</text>

  <rect x="300" y="250" width="360" height="90" rx="12" fill="#ecfdf5" stroke="#059669"/>
  <text x="480" y="282" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#065f46">Scoped Queryset</text>
  <text x="480" y="306" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#047857">Project.objects.filter(organization_id=current_org_id)</text>
  <text x="480" y="326" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#047857">Cross-tenant IDs return 404</text>

  <rect x="760" y="250" width="160" height="70" rx="10" fill="#fef2f2" stroke="#dc2626"/>
  <text x="840" y="280" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#991b1b">403 Forbidden</text>
  <text x="840" y="302" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#b91c1c">organization_required</text>

  <line x1="190" y1="125" x2="228" y2="125" stroke="#334155" marker-end="url(#arrow)"/>
  <line x1="400" y1="125" x2="438" y2="125" stroke="#334155" marker-end="url(#arrow)"/>
  <line x1="660" y1="125" x2="698" y2="125" stroke="#334155" marker-end="url(#arrow)"/>
  <line x1="810" y1="160" x2="810" y2="210" stroke="#334155" marker-end="url(#arrow)"/>
  <line x1="810" y1="210" x2="480" y2="210" stroke="#334155"/>
  <line x1="480" y1="210" x2="480" y2="248" stroke="#334155" marker-end="url(#arrow)"/>
  <line x1="810" y1="210" x2="840" y2="210" stroke="#334155"/>
  <line x1="840" y1="210" x2="840" y2="248" stroke="#334155" marker-end="url(#arrow)"/>
</svg>
