<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" role="img" aria-labelledby="title desc">
  <title id="title">Shared schema multi-tenant data model</title>
  <desc id="desc">User, Organization, Membership, and Project entities with organization_id discriminator.</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="900" height="360" fill="#f8fafc"/>

  <text x="450" y="34" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Shared Schema Tenancy Model</text>
  <text x="450" y="56" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#475569">Single PostgreSQL database, discriminator column organization_id</text>

  <rect x="60" y="100" width="180" height="110" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="150" y="130" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#1d4ed8">User</text>
  <text x="150" y="154" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#334155">id, email</text>
  <text x="150" y="174" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#334155">password</text>

  <rect x="360" y="90" width="180" height="130" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="450" y="120" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#6d28d9">Organization</text>
  <text x="450" y="144" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#334155">id, name, slug</text>
  <text x="450" y="164" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#334155">created_at</text>

  <rect x="660" y="100" width="180" height="110" rx="12" fill="#ffffff" stroke="#059669" stroke-width="1.5"/>
  <text x="750" y="130" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#047857">Project</text>
  <text x="750" y="154" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#334155">id, name</text>
  <text x="750" y="174" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#334155">organization_id</text>

  <rect x="300" y="260" width="300" height="70" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="450" y="290" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#c2410c">Membership</text>
  <text x="450" y="314" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#9a3412">user_id, organization_id, role (owner or member)</text>

  <line x1="150" y1="210" x2="150" y2="240" stroke="#64748b" stroke-width="2"/>
  <line x1="150" y1="240" x2="380" y2="240" stroke="#64748b" stroke-width="2"/>
  <line x1="380" y1="240" x2="380" y2="258" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="450" y1="220" x2="450" y2="258" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="520" y1="175" x2="520" y2="240" stroke="#64748b" stroke-width="2"/>
  <line x1="520" y1="240" x2="620" y2="240" stroke="#64748b" stroke-width="2"/>
  <line x1="620" y1="240" x2="620" y2="258" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="540" y1="155" x2="660" y2="155" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
